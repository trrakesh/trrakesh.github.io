<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Gold & Silver Rates</title>
    <meta
      name="description"
      content="Live gold and silver rates."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <main class="container">
      <header class="hero">
        <p class="eyebrow">Market Snapshot</p>
        <div class="meta-row">
          <span id="updatedDate" class="pill">Updated: --</span>
          <button id="refreshBtn" class="refresh-btn" type="button">Refresh</button>
        </div>
      </header>

      <section>
        <div id="status" class="status" role="status" aria-live="polite">Loading latest rates...</div>
        <div id="ratesGrid" class="rates-grid" aria-live="polite"></div>
      </section>
    </main>

    <template id="rateCardTemplate">
      <article class="rate-card">
        <div class="rate-label"></div>
        <div class="rate-value"></div>
        <div class="rate-change-row">
          <span class="chip"></span>
          <span class="trend"></span>
        </div>
      </article>
    </template>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
