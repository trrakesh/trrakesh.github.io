<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STL Viewer</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f172a'/%3E%3Cpath d='M18 20h28l-8 8H26z' fill='%233b82f6'/%3E%3Cpath d='M18 44h28l-8-8H26z' fill='%2360a5fa'/%3E%3C/svg%3E" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background:
          radial-gradient(circle at top left, rgba(59, 130, 246, 0.25), transparent 28%),
          linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 100%);
        color: #f8fafc;
        font-smooth: always;
        -webkit-font-smoothing: antialiased;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 1.1rem 1.4rem;
        margin: 1rem 1rem 0.8rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1rem;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 18px 45px rgba(2, 6, 23, 0.28);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.9rem;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 2.6rem;
        height: 2.6rem;
        border-radius: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: white;
        background: linear-gradient(135deg, #3b82f6, #60a5fa);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
      }

      h1 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 700;
      }

      .brand p {
        margin: 0.2rem 0 0;
        font-size: 0.85rem;
        color: #cbd5e1;
      }

      .controls {
        display: flex;
        gap: 0.7rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .btn {
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        padding: 0.7rem 0.95rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: #f8fafc;
        cursor: pointer;
        transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.24);
      }

      .primary-btn {
        background: linear-gradient(135deg, #2563eb, #3b82f6);
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.25);
      }

      .secondary-btn {
        background: rgba(255, 255, 255, 0.08);
      }

      #viewer {
        position: relative;
        flex: 1;
        margin: 0 1rem 1rem;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.2rem;
        background: linear-gradient(145deg, rgba(2, 6, 23, 0.86), rgba(15, 23, 42, 0.92));
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 22px 60px rgba(2, 6, 23, 0.4);
      }

      #viewer::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: inherit;
        background: linear-gradient(120deg, rgba(255,255,255,0.08), transparent 32%, transparent 70%, rgba(255,255,255,0.04));
      }

      #hint {
        position: absolute;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 3;
        padding: 0.6rem 0.9rem;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.16);
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 10px 20px rgba(2, 6, 23, 0.22);
        backdrop-filter: blur(10px);
        font-size: 0.9rem;
        pointer-events: none;
      }

      .status-card {
        position: absolute;
        left: 1rem;
        bottom: 1rem;
        z-index: 3;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        padding: 0.8rem 0.95rem;
        border-radius: 0.9rem;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(15, 23, 42, 0.76);
        box-shadow: 0 12px 24px rgba(2, 6, 23, 0.22);
        backdrop-filter: blur(12px);
      }

      .status-dot {
        width: 0.64rem;
        height: 0.64rem;
        border-radius: 50%;
        background: #34d399;
        box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.55);
        animation: pulse 1.8s infinite;
      }

      #status {
        font-size: 0.92rem;
        color: #e2e8f0;
      }

      #axisOverlay {
        position: absolute;
        top: 1rem;
        right: 1rem;
        z-index: 3;
        width: 120px;
        height: 120px;
        border-radius: 0.85rem;
        border: 1px solid rgba(255,255,255,0.12);
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 12px 24px rgba(2, 6, 23, 0.22);
        backdrop-filter: blur(12px);
      }

      #axisOverlay canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      input[type="file"] {
        display: none;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.45);
        }
        70% {
          box-shadow: 0 0 0 8px rgba(52, 211, 153, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(52, 211, 153, 0);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="brand">
        <div class="brand-mark">3D</div>
        <div>
          <h1>STL Viewer Studio</h1>
          <p>Review and inspect STL models with a polished workspace.</p>
        </div>
      </div>
      <div class="controls">
        <label class="btn primary-btn" for="fileInput">Upload STL</label>
        <input id="fileInput" type="file" accept=".stl" />
        <button id="resetView" class="btn secondary-btn" type="button">Reset View</button>
      </div>
    </header>
    <div id="viewer">
      <div id="hint">Drag to rotate • Scroll to zoom • Pan with the orbit controls</div>
      <div id="axisOverlay"></div>
      <div class="status-card">
        <div class="status-dot"></div>
        <div id="status">Loading sample model…</div>
      </div>
    </div>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { STLLoader } from 'three/addons/loaders/STLLoader.js';

      const container = document.getElementById('viewer');
      const status = document.getElementById('status');
      const fileInput = document.getElementById('fileInput');
      const resetViewButton = document.getElementById('resetView');
      const axisOverlay = document.getElementById('axisOverlay');

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0b1120);
      scene.fog = new THREE.FogExp2(0x0b1120, 0.035);

      const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.set(0, 0, 8);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(container.clientWidth, container.clientHeight);
      container.appendChild(renderer.domElement);

      const axisRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
      axisRenderer.setSize(110, 110);
      axisRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      axisOverlay.appendChild(axisRenderer.domElement);

      const axisScene = new THREE.Scene();
      axisScene.background = new THREE.Color(0x00000000);

      const axisCamera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
      axisCamera.position.set(2.2, 2.2, 2.2);
      axisCamera.lookAt(0, 0, 0);

      const axisGroup = new THREE.Group();
      axisScene.add(axisGroup);

      const worldQuaternion = new THREE.Quaternion();
      const cubeGeometry = new THREE.BoxGeometry(0.7, 0.7, 0.7);
      const cubeMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
      const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
      axisGroup.add(cube);

      const axisMaterials = {
        x: new THREE.MeshBasicMaterial({ color: 0xef4444 }),
        y: new THREE.MeshBasicMaterial({ color: 0x22c55e }),
        z: new THREE.MeshBasicMaterial({ color: 0x3b82f6 })
      };

      const axisCubes = [
        new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 0.18), axisMaterials.x),
        new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 0.18), axisMaterials.y),
        new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 0.18), axisMaterials.z)
      ];

      axisCubes[0].position.set(0.5, 0, 0);
      axisCubes[1].position.set(0, 0.5, 0);
      axisCubes[2].position.set(0, 0, 0.5);
      axisCubes.forEach((child) => axisGroup.add(child));

      function drawAxisWidget() {
        axisGroup.quaternion.copy(camera.quaternion).invert();
        axisRenderer.render(axisScene, axisCamera);
      }

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.enablePan = false;
      controls.enableRotate = true;
      controls.rotateSpeed = 0.8;
      controls.autoRotate = false;
      controls.minDistance = 2;
      controls.maxDistance = 50;

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
      directionalLight.position.set(5, 5, 7);
      scene.add(directionalLight);

      const gridHelper = new THREE.GridHelper(20, 20, 0x475569, 0x334155);
      scene.add(gridHelper);

      const loader = new STLLoader();
      const sampleStlSource = 'data:text/plain;charset=utf-8,' + encodeURIComponent(`solid simple_model
  facet normal 0.0 0.0 1.0
    outer loop
      vertex 0.0 0.0 0.0
      vertex 1.0 0.0 0.0
      vertex 0.0 1.0 0.0
    endloop
  endfacet
  facet normal 0.0 0.0 1.0
    outer loop
      vertex 1.0 0.0 0.0
      vertex 1.0 1.0 0.0
      vertex 0.0 1.0 0.0
    endloop
  endfacet
  facet normal 0.0 1.0 0.0
    outer loop
      vertex 0.0 0.0 0.0
      vertex 0.0 1.0 0.0
      vertex 0.0 0.0 1.0
    endloop
  endfacet
  facet normal 1.0 0.0 0.0
    outer loop
      vertex 0.0 0.0 0.0
      vertex 0.0 0.0 1.0
      vertex 1.0 0.0 0.0
    endloop
  endfacet
  facet normal 0.0 0.0 -1.0
    outer loop
      vertex 0.0 1.0 0.0
      vertex 1.0 1.0 0.0
      vertex 0.0 0.0 1.0
    endloop
  endfacet
endsolid simple_model
`);
      let currentMesh = null;

      function setStatus(message) {
        status.textContent = message;
      }

      function fitCameraToObject(object) {
        const box = new THREE.Box3().setFromObject(object);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const fov = camera.fov * (Math.PI / 180);
        const distance = maxDim / (2 * Math.tan(fov / 2));

        camera.position.set(center.x, center.y, center.z + distance * 1.35);
        camera.lookAt(center);
        controls.target.copy(center);
        controls.update();
      }

      function clearModel() {
        if (currentMesh) {
          scene.remove(currentMesh);
          currentMesh.geometry.dispose();
          currentMesh.material.dispose();
          currentMesh = null;
        }
      }

      function loadModel(url, label) {
        clearModel();
        setStatus(`Loading ${label}…`);
        loader.load(
          url,
          (geometry) => {
            geometry.computeVertexNormals();
            const material = new THREE.MeshStandardMaterial({
              color: 0x3b82f6,
              metalness: 0.2,
              roughness: 0.6
            });
            currentMesh = new THREE.Mesh(geometry, material);
            scene.add(currentMesh);
            fitCameraToObject(currentMesh);
            setStatus(`${label} loaded successfully.`);
          },
          undefined,
          (error) => {
            setStatus(`Could not load ${label}: ${error.message || error}`);
            console.error(error);
          }
        );
      }

      const API_URL = 'https://murm6lfv3g.execute-api.us-east-1.amazonaws.com/default/3d-object-upload';

      fileInput.addEventListener('change', async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;

        const localUrl = URL.createObjectURL(file);
        loadModel(localUrl, file.name);

        setStatus(`Uploading ${file.name} to cloud…`);
        try {
          const base64 = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });

          const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fileName: file.name, file: base64 })
          });

          if (!res.ok) throw new Error(`Upload failed: ${res.status} ${res.statusText}`);

          setStatus(`${file.name} loaded and saved to cloud.`);
        } catch (err) {
          setStatus(`${file.name} loaded. Cloud upload failed: ${err.message}`);
          console.error(err);
        } finally {
          URL.revokeObjectURL(localUrl);
        }
      });

      resetViewButton.addEventListener('click', () => {
        if (currentMesh) {
          fitCameraToObject(currentMesh);
        }
      });

      window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
        axisRenderer.setSize(110, 110);
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        scene.updateMatrixWorld(true);

        renderer.render(scene, camera);
        drawAxisWidget();
      }

      animate();
      loadModel(sampleStlSource, 'sample model');
    </script>
  </body>
</html>
