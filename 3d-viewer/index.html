<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STL Viewer</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f172a'/%3E%3Cpath d='M18 20h28l-8 8H26z' fill='%233b82f6'/%3E%3Cpath d='M18 44h28l-8-8H26z' fill='%2360a5fa'/%3E%3C/svg%3E" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: linear-gradient(135deg, #0f172a, #111827);
        color: #f8fafc;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      h1 {
        margin: 0;
        font-size: 1.1rem;
      }

      .controls {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
      }

      #viewer {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      #hint {
        position: absolute;
        top: 1rem;
        left: 50%;
        transform: translateX(-50%);
        padding: 0.55rem 0.8rem;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.78);
        backdrop-filter: blur(8px);
        font-size: 0.9rem;
        border: 1px solid rgba(255,255,255,0.1);
        pointer-events: none;
        z-index: 2;
      }

      label, button {
        font-size: 0.95rem;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.16);
        background: rgba(255,255,255,0.08);
        color: #f8fafc;
        padding: 0.6rem 0.9rem;
        cursor: pointer;
      }

      button:hover, label:hover {
        background: rgba(255,255,255,0.14);
      }

      #status {
        position: absolute;
        left: 1rem;
        bottom: 1rem;
        padding: 0.7rem 0.9rem;
        border-radius: 0.75rem;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px);
        font-size: 0.9rem;
        border: 1px solid rgba(255,255,255,0.1);
      }

      #axisOverlay {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 110px;
        height: 110px;
        border-radius: 0.75rem;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.1);
        z-index: 2;
      }

      #axisOverlay canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      input[type="file"] {
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>STL File Viewer</h1>
      <div class="controls">
        <label for="fileInput">Upload STL</label>
        <input id="fileInput" type="file" accept=".stl" />
        <button id="resetView" type="button">Reset View</button>
      </div>
    </header>
    <div id="viewer">
      <div id="hint">Drag to rotate • Scroll to zoom</div>
      <div id="axisOverlay"></div>
      <div id="status">Loading sample model…</div>
    </div>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import { STLLoader } from 'three/addons/loaders/STLLoader.js';

      const container = document.getElementById('viewer');
      const status = document.getElementById('status');
      const fileInput = document.getElementById('fileInput');
      const resetViewButton = document.getElementById('resetView');
      const axisOverlay = document.getElementById('axisOverlay');

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f172a);

      const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.set(0, 0, 8);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(container.clientWidth, container.clientHeight);
      container.appendChild(renderer.domElement);

      const axisRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
      axisRenderer.setSize(110, 110);
      axisRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      axisOverlay.appendChild(axisRenderer.domElement);

      const axisScene = new THREE.Scene();
      axisScene.background = new THREE.Color(0x00000000);

      const axisCamera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
      axisCamera.position.set(2.2, 2.2, 2.2);
      axisCamera.lookAt(0, 0, 0);

      const axisGroup = new THREE.Group();
      axisScene.add(axisGroup);

      const worldQuaternion = new THREE.Quaternion();
      const cubeGeometry = new THREE.BoxGeometry(0.7, 0.7, 0.7);
      const cubeMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
      const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
      axisGroup.add(cube);

      const axisMaterials = {
        x: new THREE.MeshBasicMaterial({ color: 0xef4444 }),
        y: new THREE.MeshBasicMaterial({ color: 0x22c55e }),
        z: new THREE.MeshBasicMaterial({ color: 0x3b82f6 })
      };

      const axisCubes = [
        new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 0.18), axisMaterials.x),
        new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 0.18), axisMaterials.y),
        new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.18, 0.18), axisMaterials.z)
      ];

      axisCubes[0].position.set(0.5, 0, 0);
      axisCubes[1].position.set(0, 0.5, 0);
      axisCubes[2].position.set(0, 0, 0.5);
      axisCubes.forEach((child) => axisGroup.add(child));

      function drawAxisWidget() {
        axisGroup.quaternion.copy(camera.quaternion).invert();
        axisRenderer.render(axisScene, axisCamera);
      }

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.enablePan = false;
      controls.enableRotate = true;
      controls.rotateSpeed = 0.8;
      controls.autoRotate = false;
      controls.minDistance = 2;
      controls.maxDistance = 50;

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
      directionalLight.position.set(5, 5, 7);
      scene.add(directionalLight);

      const gridHelper = new THREE.GridHelper(20, 20, 0x475569, 0x334155);
      scene.add(gridHelper);

      const loader = new STLLoader();
      const sampleStlSource = 'data:text/plain;charset=utf-8,' + encodeURIComponent(`solid simple_model
  facet normal 0.0 0.0 1.0
    outer loop
      vertex 0.0 0.0 0.0
      vertex 1.0 0.0 0.0
      vertex 0.0 1.0 0.0
    endloop
  endfacet
  facet normal 0.0 0.0 1.0
    outer loop
      vertex 1.0 0.0 0.0
      vertex 1.0 1.0 0.0
      vertex 0.0 1.0 0.0
    endloop
  endfacet
  facet normal 0.0 1.0 0.0
    outer loop
      vertex 0.0 0.0 0.0
      vertex 0.0 1.0 0.0
      vertex 0.0 0.0 1.0
    endloop
  endfacet
  facet normal 1.0 0.0 0.0
    outer loop
      vertex 0.0 0.0 0.0
      vertex 0.0 0.0 1.0
      vertex 1.0 0.0 0.0
    endloop
  endfacet
  facet normal 0.0 0.0 -1.0
    outer loop
      vertex 0.0 1.0 0.0
      vertex 1.0 1.0 0.0
      vertex 0.0 0.0 1.0
    endloop
  endfacet
endsolid simple_model
`);
      let currentMesh = null;

      function setStatus(message) {
        status.textContent = message;
      }

      function fitCameraToObject(object) {
        const box = new THREE.Box3().setFromObject(object);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const fov = camera.fov * (Math.PI / 180);
        const distance = maxDim / (2 * Math.tan(fov / 2));

        camera.position.set(center.x, center.y, center.z + distance * 1.35);
        camera.lookAt(center);
        controls.target.copy(center);
        controls.update();
      }

      function clearModel() {
        if (currentMesh) {
          scene.remove(currentMesh);
          currentMesh.geometry.dispose();
          currentMesh.material.dispose();
          currentMesh = null;
        }
      }

      function loadModel(url, label) {
        clearModel();
        setStatus(`Loading ${label}…`);
        loader.load(
          url,
          (geometry) => {
            geometry.computeVertexNormals();
            const material = new THREE.MeshStandardMaterial({
              color: 0x3b82f6,
              metalness: 0.2,
              roughness: 0.6
            });
            currentMesh = new THREE.Mesh(geometry, material);
            scene.add(currentMesh);
            fitCameraToObject(currentMesh);
            setStatus(`${label} loaded successfully.`);
          },
          undefined,
          (error) => {
            setStatus(`Could not load ${label}: ${error.message || error}`);
            console.error(error);
          }
        );
      }

      const API_URL = 'https://murm6lfv3g.execute-api.us-east-1.amazonaws.com/default/3d-object-upload';

      fileInput.addEventListener('change', async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;

        const localUrl = URL.createObjectURL(file);
        loadModel(localUrl, file.name);

        setStatus(`Uploading ${file.name} to cloud…`);
        try {
          const base64 = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });

          const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fileName: file.name, file: base64 })
          });

          if (!res.ok) throw new Error(`Upload failed: ${res.status} ${res.statusText}`);

          setStatus(`${file.name} loaded and saved to cloud.`);
        } catch (err) {
          setStatus(`${file.name} loaded. Cloud upload failed: ${err.message}`);
          console.error(err);
        } finally {
          URL.revokeObjectURL(localUrl);
        }
      });

      resetViewButton.addEventListener('click', () => {
        if (currentMesh) {
          fitCameraToObject(currentMesh);
        }
      });

      window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
        axisRenderer.setSize(110, 110);
      });

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        scene.updateMatrixWorld(true);

        renderer.render(scene, camera);
        drawAxisWidget();
      }

      animate();
      loadModel(sampleStlSource, 'sample model');
    </script>
  </body>
</html>
