<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header { text-align: center; margin-bottom: 40px; }

    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      color: #c7d2fe;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    header h1 { font-size: 2.2rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    header p  { margin-top: 8px; color: #a5b4fc; font-size: 0.95rem; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      width: 100%;
      max-width: 860px;
    }

    @media (max-width: 620px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(16px);
    }

    .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }

    .icon-wrap {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .icon-wrap.purple { background: linear-gradient(135deg, #7c3aed, #4f46e5); }
    .icon-wrap.blue   { background: linear-gradient(135deg, #0ea5e9, #6366f1); }

    .card-header h2 { font-size: 1rem; font-weight: 600; color: #e0e7ff; }
    .card-header p  { font-size: 0.78rem; color: #818cf8; margin-top: 2px; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: #a5b4fc;
      margin-bottom: 6px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    input[type="date"],
    input[type="number"],
    select {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      color: #e0e7ff;
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      margin-bottom: 16px;
      color-scheme: dark;
    }

    input[type="date"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: #818cf8;
      background: rgba(255,255,255,0.1);
    }

    .row { display: flex; gap: 10px; margin-bottom: 16px; }
    .row input, .row select { margin-bottom: 0; flex: 1; }

    button {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    button:hover  { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .result {
      display: none;
      margin-top: 18px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.35);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .main-val { font-size: 1.6rem; font-weight: 700; color: #fff; }
    .sub-val  { font-size: 0.82rem; color: #a5b4fc; margin-top: 4px; }

    .stat-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .stat { text-align: center; }
    .stat .val { font-size: 1.1rem; font-weight: 700; color: #e0e7ff; }
    .stat .lbl { font-size: 0.72rem; color: #818cf8; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }

    footer { margin-top: 40px; color: #818cf8; font-size: 0.78rem; }

    /* Custom Dialog */
    .dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .dialog-overlay.show { display: flex; }
    .dialog-box {
      background: #1e1b4b;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 28px 32px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .dialog-icon {
      width: 48px; height: 48px;
      background: rgba(99,102,241,0.2);
      border: 1px solid rgba(99,102,241,0.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }
    .dialog-icon svg { width: 22px; height: 22px; stroke: #818cf8; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .dialog-msg  { color: #e0e7ff; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.5; }
    .dialog-btn {
      padding: 10px 32px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      width: auto;
    }
  </style>
</head>
<body>

  <header>
    <div class="badge">&#9889; Utility Tool</div>
    <h1>Date Calculator</h1>
    <p>Calculate differences and shift dates with precision</p>
  </header>

  <div class="grid">

    <!-- Date Difference -->
    <div class="card">
      <div class="card-header">
        <div class="icon-wrap purple">&#128197;</div>
        <div>
          <h2>Date Difference</h2>
          <p>Find the gap between two dates</p>
        </div>
      </div>
      <label>Start Date</label>
      <input type="date" id="startDate">
      <label>End Date</label>
      <input type="date" id="endDate">
      <button type="button" onclick="calcDiff()">Calculate Difference</button>
      <div id="diffResult" class="result">
        <div class="main-val" id="diffDays"></div>
        <div class="sub-val" id="diffNote"></div>
        <div class="stat-row">
          <div class="stat"><div class="val" id="diffY"></div><div class="lbl">Years</div></div>
          <div class="stat"><div class="val" id="diffM"></div><div class="lbl">Months</div></div>
          <div class="stat"><div class="val" id="diffD"></div><div class="lbl">Days</div></div>
        </div>
      </div>
    </div>

    <!-- Add / Subtract Days -->
    <div class="card">
      <div class="card-header">
        <div class="icon-wrap blue">&#128290;</div>
        <div>
          <h2>Add / Subtract Days</h2>
          <p>Shift a date by any number of days</p>
        </div>
      </div>
      <label>Base Date</label>
      <input type="date" id="baseDate">
      <label>Days &amp; Operation</label>
      <div class="row">
        <input type="number" id="numDays" placeholder="e.g. 30" min="0">
        <select id="operation">
          <option value="add">+ Add</option>
          <option value="sub">- Subtract</option>
        </select>
      </div>
      <button type="button" onclick="calcAddSub()">Calculate New Date</button>
      <div id="addSubResult" class="result">
        <div class="main-val" id="addSubDate"></div>
        <div class="sub-val" id="addSubNote"></div>
      </div>
    </div>

  </div>

  <!-- Custom Dialog -->
  <div class="dialog-overlay" id="dialogOverlay">
    <div class="dialog-box">
      <div class="dialog-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div class="dialog-msg" id="dialogMsg"></div>
      <button type="button" class="dialog-btn" onclick="closeDialog()">OK</button>
    </div>
  </div>

  <footer>&copy; 2025 Date Calculator</footer>

  <script>
    function todayStr() {
      var d = new Date();
      var mm = String(d.getMonth() + 1).padStart(2, '0');
      var dd = String(d.getDate()).padStart(2, '0');
      return d.getFullYear() + '-' + mm + '-' + dd;
    }

    window.onload = function() {
      var today = todayStr();
      document.getElementById('startDate').value = today;
      document.getElementById('endDate').value   = today;
      document.getElementById('baseDate').value  = today;
    };

    function showDialog(msg) {
      document.getElementById('dialogMsg').textContent = msg;
      document.getElementById('dialogOverlay').classList.add('show');
    }

    function closeDialog() {
      document.getElementById('dialogOverlay').classList.remove('show');
    }

    function parseLocal(str) {
      var parts = str.split('-');
      return new Date(+parts[0], +parts[1] - 1, +parts[2]);
    }

    function calcDiff() {
      var s = document.getElementById('startDate').value;
      var e = document.getElementById('endDate').value;

      if (!s || !e) {
        showDialog('Please select both dates.');
        return;
      }

      var start    = parseLocal(s);
      var end      = parseLocal(e);
      var totalDays = Math.round((end - start) / 86400000);
      var abs      = Math.abs(totalDays);
      var years    = Math.floor(abs / 365);
      var months   = Math.floor((abs % 365) / 30);
      var remDays  = abs % 30;

      document.getElementById('diffDays').textContent = abs + (abs === 1 ? ' Day' : ' Days');
      document.getElementById('diffNote').textContent = totalDays === 0
        ? 'Same date'
        : 'End date is ' + abs + ' day(s) ' + (totalDays > 0 ? 'after' : 'before') + ' start date';
      document.getElementById('diffY').textContent = years;
      document.getElementById('diffM').textContent = months;
      document.getElementById('diffD').textContent = remDays;

      document.getElementById('diffResult').style.display = 'block';
    }

    function calcAddSub() {
      var base    = document.getElementById('baseDate').value;
      var numDays = parseInt(document.getElementById('numDays').value, 10);
      var op      = document.getElementById('operation').value;

      if (!base || isNaN(numDays)) {
        showDialog('Please enter a date and number of days.');
        return;
      }

      var date = parseLocal(base);
      date.setDate(date.getDate() + (op === 'add' ? numDays : -numDays));

      var opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('addSubDate').textContent = date.toLocaleDateString(undefined, opts);
      document.getElementById('addSubNote').textContent =
        (op === 'add' ? '+' : '-') + numDays + ' day(s) from ' + parseLocal(base).toLocaleDateString();

      document.getElementById('addSubResult').style.display = 'block';
    }
  </script>
</body>
</html>
